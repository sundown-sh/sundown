{% extends "base.html" %}
{% block title %}Sign in · Sundown{% endblock %}
{% block body %}
<div class="max-w-md mx-auto bg-white border border-slate-200 rounded-lg p-6 shadow-sm">
  <h1 class="text-xl font-semibold mb-1">Sign in to Sundown</h1>
  <p class="text-sm text-slate-500 mb-6">Local users only. SSO is in the hosted version.</p>
  <form id="login-form" class="space-y-4">
    <label class="block">
      <span class="text-sm text-slate-700">Email</span>
      <input name="email" type="email" required autocomplete="username"
             class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-amber-500 focus:ring-amber-500" />
    </label>
    <label class="block">
      <span class="text-sm text-slate-700">Password</span>
      <input name="password" type="password" required autocomplete="current-password"
             class="mt-1 w-full rounded-md border-slate-300 shadow-sm focus:border-amber-500 focus:ring-amber-500" />
    </label>
    <button type="submit" id="login-submit" class="w-full rounded-md bg-slate-900 text-white py-2 font-medium hover:bg-slate-800 disabled:opacity-60">Sign in</button>
    <p id="login-err" class="text-sm text-rose-600 hidden" role="alert"></p>
  </form>
</div>
<script>
  (function () {
    const form = document.getElementById('login-form');
    const errEl = document.getElementById('login-err');
    const submitBtn = document.getElementById('login-submit');

    function showErr(msg) {
      errEl.textContent = msg;
      errEl.classList.remove('hidden');
    }

    function detailFromJson(data) {
      const d = data && data.detail;
      if (typeof d === 'string') return d;
      if (Array.isArray(d))
        return d.map(function (x) { return (x && (x.msg || x.message)) || JSON.stringify(x); }).join(' ');
      if (d != null) return String(d);
      return 'Sign-in failed.';
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errEl.classList.add('hidden');
      submitBtn.disabled = true;
      try {
        const fd = new FormData(form);
        const email = fd.get('email');
        const password = fd.get('password');
        const r = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email: email, password: password }),
        });
        let data = null;
        try {
          data = await r.json();
        } catch (_) {
          /* HTML error page, empty body, etc. */
        }
        if (!r.ok) {
          showErr(data ? detailFromJson(data) : ('HTTP ' + r.status + ' — could not read error from server.'));
          return;
        }
        if (!data || !data.access_token) {
          showErr('Server returned an unexpected response (no token).');
          return;
        }
        localStorage.setItem('sundown_token', data.access_token);
        localStorage.setItem('sundown_refresh', data.refresh_token || '');
        window.location = '/';
      } catch (ex) {
        showErr(ex && ex.message ? ex.message : 'Network error — is the Sundown server running on this host?');
      } finally {
        submitBtn.disabled = false;
      }
    });
  })();
</script>
{% endblock %}
